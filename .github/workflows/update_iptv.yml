name: 🏟 IPTV Auto Update

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Chế độ crawler'
        required: false
        default: 'featured'
        type: choice
        options:
          - featured
          - all

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cài đặt dependencies
        run: |
          pip install cloudscraper beautifulsoup4 lxml requests Pillow

      - name: 🕷 Chạy crawler
        run: |
          MODE="${{ github.event.inputs.mode || 'featured' }}"
          if [ "$MODE" = "all" ]; then
            python crawler_quechoa9_v10.py --all --output quechoa9.json
          else
            python crawler_quechoa9_v10.py --output quechoa9.json
          fi

      - name: 📊 Kiểm tra kết quả
        run: |
          if [ -f quechoa9.json ]; then
            CHANNELS=$(python -c "
          import json
          with open('quechoa9.json') as f:
              d = json.load(f)
          total = sum(len(g.get('channels',[])) for g in d.get('groups',[]))
          print(total)
            ")
            SIZE=$(du -sh quechoa9.json | cut -f1)
            echo "✅ $CHANNELS trận | 📦 $SIZE"
            echo "CHANNELS=$CHANNELS" >> $GITHUB_ENV
          else
            echo "❌ Không tìm thấy quechoa9.json"; exit 1
          fi

      - name: 🚀 Commit & Push JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quechoa9.json
          if git diff --staged --quiet; then
            echo "ℹ Không có thay đổi"
          else
            TIMESTAMP=$(TZ='Asia/Ho_Chi_Minh' date '+%d/%m/%Y %H:%M:%S ICT')
            git commit -m "🏟 Update: ${{ env.CHANNELS }} trận — $TIMESTAMP"
            git push
            echo "✅ Đã push lên GitHub"
          fi

      - name: 📋 In URL MonPlayer
        run: |
          echo "======================================"
          echo "  URL JSON them vao MonPlayer:"
          echo "  https://raw.githubusercontent.com/${{ github.repository }}/main/quechoa9.json"
          echo "======================================"
