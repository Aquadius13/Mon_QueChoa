<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QueCho9 IPTV</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #0f1923; color: #eee; }
  h1 { color: #4caf50; }
  .url-box { background: #1e2d3d; border: 1px solid #4caf50; border-radius: 8px; padding: 14px 18px; font-family: monospace; font-size: 15px; word-break: break-all; margin: 12px 0; }
  .copy-btn { background: #4caf50; color: white; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; margin-left: 8px; }
  .copy-btn:hover { background: #43a047; }
  p { color: #aaa; line-height: 1.6; }
  .badge { display: inline-block; background: #e53935; color: white; border-radius: 4px; padding: 2px 8px; font-size: 12px; margin-right: 6px; }
</style>
</head>
<body>
<h1>📡 QueCho9 IPTV</h1>
<p>Danh sách trận đấu trực tiếp, tự động cập nhật mỗi 30 phút.</p>

<h3>🔗 URL cho MonPlayer:</h3>
<div class="url-box" id="jsonUrl">
  <span id="urlText">Đang tải...</span>
  <button class="copy-btn" onclick="copyUrl()">Copy</button>
</div>

<h3>📖 Hướng dẫn:</h3>
<ol style="color:#ccc; line-height:1.9">
  <li>Mở <strong>MonPlayer</strong></li>
  <li>Chọn <strong>Add Source → URL</strong></li>
  <li>Dán URL ở trên → <strong>OK</strong></li>
</ol>

<p style="margin-top:30px; font-size:12px; color:#555">
  Tự động cập nhật lúc: <span id="updated">...</span>
</p>

<script>
  const base = window.location.href.replace(/\/[^/]*$/, '');
  const url  = base + '/quechoa9_iptv.json';
  document.getElementById('urlText').textContent = url;

  function copyUrl() {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Đã copy!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  fetch('quechoa9_iptv.json').then(r => r.json()).then(d => {
    document.getElementById('updated').textContent = d.description || '';
  }).catch(() => {});
</script>
</body>
</html>
