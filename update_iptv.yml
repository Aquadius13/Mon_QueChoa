name: 🏟 IPTV Auto Update

on:
  # Chạy tự động theo lịch (UTC — Việt Nam = UTC+7)
  schedule:
    - cron: '*/10 * * * *'   # Mỗi 10 phút (phù hợp cho trận đang live)

  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'Chế độ crawler'
        required: false
        default: 'featured'
        type: choice
        options:
          - featured   # Chỉ tâm điểm
          - all        # Tất cả trận

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Cần để commit file JSON

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Cài đặt dependencies
        run: |
          pip install cloudscraper beautifulsoup4 lxml

      - name: 🕷 Chạy crawler
        run: |
          MODE="${{ github.event.inputs.mode || 'featured' }}"
          if [ "$MODE" = "all" ]; then
            python crawler_quechoa9_v7.py --all --output quechoa9.json
          else
            python crawler_quechoa9_v7.py --output quechoa9.json
          fi

      - name: 📊 Kiểm tra kết quả
        run: |
          if [ -f quechoa9.json ]; then
            CHANNELS=$(python -c "
          import json
          with open('quechoa9.json') as f:
              d = json.load(f)
          total = sum(len(g.get('channels',[])) for g in d.get('groups',[]))
          print(total)
            ")
            echo "✅ Crawler OK — $CHANNELS trận đấu"
            echo "CHANNELS=$CHANNELS" >> $GITHUB_ENV
          else
            echo "❌ Không tìm thấy quechoa9.json"
            exit 1
          fi

      - name: 🚀 Commit & Push JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quechoa9.json
          # Chỉ commit nếu có thay đổi
          if git diff --staged --quiet; then
            echo "ℹ Không có thay đổi — bỏ qua commit"
          else
            TIMESTAMP=$(TZ='Asia/Ho_Chi_Minh' date '+%d/%m/%Y %H:%M:%S ICT')
            git commit -m "🏟 Update IPTV: ${{ env.CHANNELS }} trận — $TIMESTAMP"
            git push
            echo "✅ Đã push lên GitHub"
          fi

      - name: 📋 In URL MonPlayer
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"
          echo ""
          echo "══════════════════════════════════════════"
          echo "  🌐 URL Thêm vào MonPlayer:"
          echo "  https://raw.githubusercontent.com/$REPO/$BRANCH/quechoa9.json"
          echo "══════════════════════════════════════════"
